<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <!-- Inverter Unit -->
  <rect x="22" y="20" width="34" height="52" rx="4" fill="#e2e8f0" stroke="#475569" stroke-width="3" />
  <rect x="27" y="25" width="24" height="12" rx="2" fill="#1e293b" />
  <!-- Display lines inside screen -->
  <circle cx="33" cy="31" r="1.5" fill="#2ecc71" />
  <rect x="38" y="30" width="10" height="2" rx="0.5" fill="#2ecc71" />
  
  <!-- Ventilation Grill lines -->
  <line x1="28" y1="44" x2="50" y2="44" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <line x1="28" y1="49" x2="50" y2="49" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <line x1="28" y1="54" x2="50" y2="54" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <line x1="28" y1="59" x2="50" y2="59" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  
  <!-- Connection Ports at the bottom -->
  <rect x="28" y="72" width="6" height="5" fill="#475569" />
  <rect x="42" y="72" width="6" height="5" fill="#475569" />

  <!-- Warning Sign (Yellow Triangle) -->
  <polygon points="76,46 58,78 94,78" fill="#f59e0b" stroke="#d97706" stroke-width="3" stroke-linejoin="round" />
  <path d="M76 56 V 68" stroke="white" stroke-width="4" stroke-linecap="round" />
  <circle cx="76" cy="73" r="2.5" fill="white" />
</svg>
